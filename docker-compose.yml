# ============================================================
# docker-compose.yml
# ⚠️  CHỈ DÙNG KHI DEPLOY LÊN VPS — KHÔNG DÙNG KHI DEV LOCAL
# ⚠️  Khi phát triển local, database dùng MongoDB Atlas (cloud).
# ============================================================
# Hướng dẫn deploy:
#   1. Copy file .env vào server (MONGODB_URI trỏ tới Atlas hoặc container mongo)
#   2. docker compose up -d
# ============================================================

version: '4.7'

services:
  # ─── NestJS App ──────────────────────────────────────────────
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: english_learning_server
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    ports:
      - '3000:3000'
    depends_on:
      - mongo

  # ─── MongoDB (self-hosted cho VPS) ───────────────────────────
  # Khi dev local → dùng MongoDB Atlas thay thế (không cần container này)
  mongo:
    image: mongo:7-jammy
    container_name: english_learning_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: english_learning
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mongo Express (DB GUI, tương tự Adminer) ────────────────
  mongo-express:
    image: mongo-express:1
    container_name: english_learning_mongo_express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: mongo
      ME_CONFIG_MONGODB_ADMINPASSWORD: mongo
      ME_CONFIG_MONGODB_URL: mongodb://mongo:mongo@mongo:27017/
      ME_CONFIG_BASICAUTH: false

volumes:
  mongo_data:
    name: english_learning_mongo_data
